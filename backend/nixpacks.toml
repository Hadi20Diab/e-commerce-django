# nixpacks.toml — tells Railway's Nixpacks builder to install
# the OS-level libraries that Pillow needs to compile from source.
[phases.setup]
nixPkgs = ["python311", "libjpeg", "zlib", "libwebp", "freetype", "lcms2", "openjpeg"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
