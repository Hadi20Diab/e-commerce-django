[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
# migrate + collectstatic are required; seed_data is optional (|| true so it never blocks the deploy)
preDeployCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && (python manage.py seed_data || true)"
healthcheckPath = "/health/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.envVars]]
name = "PYTHONUNBUFFERED"
value = "1"
