databases:
  - name: luxe-db
    databaseName: luxe
    user: luxe
    plan: free

services:
  - type: web
    name: luxe-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput && (python manage.py seed_data || true)
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: luxe-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://luxe--commerce.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://luxe-backend.onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"
